let selectedRecipe = null;
let recipePortions = 4;

// Init Supabase
function initSupabase() {
  if (SUPABASE_URL !== 'TUTAJ_WKLEJ_URL' && SUPABASE_ANON_KEY !== 'TUTAJ_WKLEJ_KLUCZ') {
    try {
      // Używamy window.supabase (obiekt biblioteki) do stworzenia klienta
      // i zapisujemy go w naszej zmiennej supabaseClient
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      useSupabase = true;
      console.log('✅ Supabase połączone!');
    } catch(e) { console.warn('Supabase init failed, używam LocalStorage', e); }
  } else {
    console.log('ℹ️ Tryb LocalStorage (brak kluczy Supabase)');
  }
}

// LocalStorage helpers
function lsGet(key, def=[]) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// Toast
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
//  DATA LAYER
// ============================================================

async function loadShopping() {
  if (useSupabase) {
    const { data, error } = await supabaseClient.from('shopping_list').select('*').order('created_at');
    if (!error && data) { shoppingItems = data; return; }
  }
  shoppingItems = lsGet('shopping_list', []);
}

async function addShoppingItem(name, tags) {
  const item = { id: crypto.randomUUID(), name, added_by: currentUser, status: 'want', tags, created_at: new Date().toISOString() };
  if (useSupabase) {
    const { data, error } = await supabaseClient.from('shopping_list').insert(item).select().single();
    if (!error && data) { shoppingItems.push(data); return; }
  }
  shoppingItems.push(item);
  lsSet('shopping_list', shoppingItems);
}

async function updateShoppingStatus(id, status) {
  if (useSupabase) {
    await supabaseClient.from('shopping_list').update({ status }).eq('id', id);
  }
  const i = shoppingItems.findIndex(x => x.id === id);
  if (i !== -1) { shoppingItems[i].status = status; lsSet('shopping_list', shoppingItems); }
}

async function deleteShoppingItem(id) {
  if (useSupabase) {
    await supabaseClient.from('shopping_list').delete().eq('id', id);
  }
  shoppingItems = shoppingItems.filter(x => x.id !== id);
  lsSet('shopping_list', shoppingItems);
}

async function loadExpenses() {
  if (useSupabase) {
    const { data, error } = await supabaseClient.from('expenses').select('*').order('created_at');
    if (!error && data) { expenses = data; return; }
  }
  expenses = lsGet('expenses', []);
}

async function addExpense(title, amount, paid_by) {
  const item = { id: crypto.randomUUID(), title, amount: parseFloat(amount), paid_by, created_at: new Date().toISOString() };
  if (useSupabase) {
    const { data, error } = await supabaseClient.from('expenses').insert(item).select().single();
    if (!error && data) { expenses.push(data); return; }
  }
  expenses.push(item);
  lsSet('expenses', expenses);
}

async function deleteExpense(id) {
  if (useSupabase) {
    await supabaseClient.from('expenses').delete().eq('id', id);
  }
  expenses = expenses.filter(x => x.id !== id);
  lsSet('expenses', expenses);
}

// Supabase realtime
function setupRealtime() {
  if (!useSupabase) return;
  supabaseClient.channel('changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_list' }, async () => {
      await loadShopping(); renderShopping();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, async () => {
      await loadExpenses(); renderExpenses();
    })
    .subscribe();
}

function statusLabel(s) {
  if (s==='want') return '<span class="badge-want text-xs px-2 py-0.5 rounded-full font-bold">🛒 Do kupienia</span>';
  if (s==='cart') return '<span class="badge-cart text-xs px-2 py-0.5 rounded-full font-bold">🧺 W koszyku</span>';
  return '<span class="badge-have text-xs px-2 py-0.5 rounded-full font-bold">✅ Mamy to</span>';
}
function nextStatus(s) { return s==='want'?'cart':s==='cart'?'have':'want'; }
function statusClass(s) { return s==='want'?'status-want':s==='cart'?'status-cart':'status-have'; }
function tagBadge(t) {
  const colors = { 'Bezglutenowe':'bg-green-100 text-green-700','Glutenowe':'bg-amber-100 text-amber-700','Bezlaktozowe':'bg-sky-100 text-sky-700','Z laktozą':'bg-purple-100 text-purple-700' };
  return `<span class="text-xs px-2 py-0.5 rounded-full font-semibold ${colors[t]||'bg-gray-100'}">${t}</span>`;
}

//  RENDER SHOPPING
// ============================================================

function renderShopping() {
  let items = [...shoppingItems];
  if (shoppingFilter !== 'all') items = items.filter(i => i.status === shoppingFilter);
  if (dietFilter !== 'all') items = items.filter(i => i.tags && i.tags.includes(dietFilter));

  const container = document.getElementById('shopping-list');
  if (!container) return;

  if (items.length === 0) {
    container.innerHTML = `<div class="text-center py-12 text-gray-400"><i class="fas fa-shopping-basket text-4xl mb-3 block opacity-40"></i><p class="font-semibold">Brak produktów${shoppingFilter!=='all'||dietFilter!=='all'?' spełniających filtry':''}</p></div>`;
    return;
  }

  container.innerHTML = items.map(item => `
    <div class="slide-in ${statusClass(item.status)} rounded-xl p-3 mb-2 shadow-sm">
      <div class="flex items-start gap-3">
        <button onclick="cycleStatus('${item.id}')" class="mt-0.5 shrink-0" title="Zmień status">
          ${statusLabel(item.status)}
        </button>
        <div class="flex-1 min-w-0">
          <p class="font-bold text-gray-800 text-sm leading-tight">${escHtml(item.name)}</p>
          <div class="flex flex-wrap gap-1 mt-1">
            ${(item.tags||[]).map(tagBadge).join('')}
          </div>
          <p class="text-xs text-gray-400 mt-1">dodał/a: <span class="font-semibold">${escHtml(item.added_by||'?')}</span></p>
        </div>
        <button onclick="removeItem('${item.id}')" class="text-gray-300 hover:text-red-400 transition-colors shrink-0 p-1"><i class="fas fa-times"></i></button>
      </div>
    </div>
  `).join('');
}

async function cycleStatus(id) {
  const item = shoppingItems.find(x => x.id === id);
  if (!item) return;
  const next = nextStatus(item.status);
  await updateShoppingStatus(id, next);
  renderShopping(); renderRecipes();
  showToast(`Status zmieniony na: ${next==='want'?'Do kupienia':next==='cart'?'W koszyku':'Mamy to'}`);
}

async function removeItem(id) {
  await deleteShoppingItem(id);
  renderShopping(); renderRecipes();
  showToast('Usunięto produkt');
}

async function handleAddItem(e) {
  e.preventDefault();
  const name = document.getElementById('item-name').value.trim();
  if (!name) return;
  const tags = DIET_TAGS.filter(t => document.getElementById('tag-'+t.replace(/\s/g,''))?.checked);
  await addShoppingItem(name, tags);
  document.getElementById('add-item-form').reset();
  renderShopping(); renderRecipes();
  showToast(`"${name}" dodano do listy!`);
}

function calcBalances() {
  const paid = {}; USERS.forEach(u => paid[u] = 0);
  expenses.forEach(e => { paid[e.paid_by] = (paid[e.paid_by]||0) + parseFloat(e.amount); });
  const total = Object.values(paid).reduce((a,b)=>a+b,0);
  const perPerson = total / USERS.length;
  const balance = {};
  USERS.forEach(u => balance[u] = +(paid[u] - perPerson).toFixed(2));
  return { paid, total, perPerson, balance };
}

function calcSettlement(balance) {
  const debtors = USERS.filter(u=>balance[u]<0).map(u=>({name:u,amount:-balance[u]}));
  const creditors = USERS.filter(u=>balance[u]>0).map(u=>({name:u,amount:balance[u]}));
  const transactions = [];
  let i=0,j=0;
  while(i<debtors.length && j<creditors.length) {
    const pay = Math.min(debtors[i].amount, creditors[j].amount);
    if (pay > 0.01) transactions.push({ from:debtors[i].name, to:creditors[j].name, amount:+pay.toFixed(2) });
    debtors[i].amount -= pay; creditors[j].amount -= pay;
    if (debtors[i].amount < 0.01) i++;
    if (creditors[j].amount < 0.01) j++;
  }
  return transactions;
}

function renderExpenses() {
  const container = document.getElementById('expenses-list');
  const summary = document.getElementById('expenses-summary');
  if (!container) return;

  const { paid, total, perPerson, balance } = calcBalances();
  const settlements = calcSettlement(balance);

  summary.innerHTML = `
    <div class="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-green-50">
      <h3 class="font-display text-base font-bold text-gray-700 mb-3">📊 Podsumowanie</h3>
      <div class="grid grid-cols-2 gap-2 mb-3">
        ${USERS.map(u=>`
          <div class="flex items-center gap-2 p-2 rounded-xl ${balance[u]>=0?'bg-green-50':'bg-red-50'}">
            <span class="text-lg">${USER_AVATARS[u]}</span>
            <div>
              <p class="text-xs font-bold text-gray-700">${u}</p>
              <p class="text-xs ${balance[u]>=0?'text-green-600':'text-red-500'} font-bold">${balance[u]>=0?'+':''}${balance[u].toFixed(2)} zł</p>
            </div>
          </div>
        `).join('')}
      </div>
      <p class="text-xs text-gray-400 text-center">Łącznie: <span class="font-bold text-gray-600">${total.toFixed(2)} zł</span> | Per person: <span class="font-bold text-gray-600">${perPerson.toFixed(2)} zł</span></p>
      ${settlements.length>0?`
        <div class="mt-3 pt-3 border-t border-gray-100">
          <p class="text-xs font-bold text-gray-500 mb-2">💸 Do rozliczenia:</p>
          ${settlements.map(s=>`<p class="text-xs bg-amber-50 rounded-lg p-2 mb-1 text-amber-800 font-semibold"><span class="font-bold">${s.from}</span> → <span class="font-bold">${s.to}</span>: ${s.amount.toFixed(2)} zł</p>`).join('')}
        </div>
      `:'<p class="text-xs text-center text-green-600 font-bold mt-2">✅ Wszyscy rozliczeni!</p>'}
    </div>
  `;

  if (expenses.length === 0) {
    container.innerHTML = `<div class="text-center py-8 text-gray-400"><i class="fas fa-receipt text-3xl mb-2 block opacity-40"></i><p class="text-sm">Brak wydatków</p></div>`;
    return;
  }
  container.innerHTML = expenses.slice().reverse().map(e=>`
    <div class="slide-in bg-white rounded-xl p-3 mb-2 shadow-sm border border-gray-50 flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 shrink-0 text-lg">💰</div>
      <div class="flex-1 min-w-0">
        <p class="font-bold text-gray-800 text-sm">${escHtml(e.title)}</p>
        <p class="text-xs text-gray-400">Zapłacił/a: <span class="font-semibold">${escHtml(e.paid_by)}</span> · ${new Date(e.created_at).toLocaleDateString('pl-PL')}</p>
      </div>
      <div class="text-right shrink-0">
        <p class="font-black text-green-700 text-base">${parseFloat(e.amount).toFixed(2)} zł</p>
        <p class="text-xs text-gray-300">${(parseFloat(e.amount)/4).toFixed(2)} zł/os</p>
      </div>
      <button onclick="removeExpense('${e.id}')" class="text-gray-200 hover:text-red-400 transition-colors p-1 ml-1"><i class="fas fa-times"></i></button>
    </div>
  `).join('');
}

async function removeExpense(id) {
  await deleteExpense(id);
  renderExpenses();
  showToast('Usunięto wydatek');
}

async function handleAddExpense(e) {
  e.preventDefault();
  const title = document.getElementById('exp-title').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const paid_by = document.getElementById('exp-payer').value;
  if (!title || !amount || amount<=0) return;
  await addExpense(title, amount, paid_by);
  document.getElementById('add-expense-form').reset();
  document.getElementById('exp-payer').value = currentUser;
  renderExpenses();
  showToast(`Wydatek "${title}" dodany!`);
}

function getHaveItems() {
  return shoppingItems.filter(i=>i.status==='have').map(i=>i.name.toLowerCase());
}

function renderRecipes(filterOwned=false) {
  const container = document.getElementById('recipes-grid');
  if (!container) return;
  const haveItems = getHaveItems();
  let recipes = RECIPES;
  if (filterOwned) {
    recipes = recipes.filter(r => r.ingredients.some(ing => haveItems.some(h=>h.includes(ing.key)||h.includes(ing.name.toLowerCase()))));
  }
  if (recipes.length===0) {
    container.innerHTML=`<div class="col-span-2 text-center py-10 text-gray-400"><i class="fas fa-utensils text-3xl mb-2 block opacity-40"></i><p class="text-sm">Brak przepisów z dostępnych składników</p></div>`;
    return;
  }
  container.innerHTML = recipes.map(r=>`
    <div onclick="openRecipe(${r.id})" class="bg-white rounded-2xl p-4 shadow-sm border border-green-50 cursor-pointer hover:shadow-md transition-all hover:-translate-y-0.5">
      <div class="text-3xl mb-2">${r.emoji}</div>
      <h4 class="font-bold text-gray-800 text-sm leading-tight mb-1">${r.name}</h4>
      <p class="text-xs text-gray-400 mb-2"><i class="fas fa-clock mr-1"></i>${r.time}</p>
      <p class="text-xs text-gray-500 line-clamp-2">${r.desc}</p>
    </div>
  `).join('');
}

function openRecipe(id) {
  selectedRecipe = RECIPES.find(r=>r.id===id);
  recipePortions = 4;
  renderRecipeModal();
  document.getElementById('recipe-modal').classList.remove('hidden');
  document.getElementById('recipe-modal').classList.add('flex');
}

function closeRecipeModal() {
  document.getElementById('recipe-modal').classList.add('hidden');
  document.getElementById('recipe-modal').classList.remove('flex');
}

function renderRecipeModal() {
  if (!selectedRecipe) return;
  const r = selectedRecipe;
  const haveItems = getHaveItems();
  const ratio = recipePortions / 4;
  const modal = document.getElementById('recipe-modal-content');
  modal.innerHTML = `
    <div class="flex items-start justify-between mb-4">
      <div>
        <span class="text-4xl">${r.emoji}</span>
        <h2 class="font-display text-xl font-bold text-gray-800 mt-1">${r.name}</h2>
        <p class="text-sm text-gray-500 mt-1"><i class="fas fa-clock mr-1 text-amber-500"></i>${r.time}</p>
      </div>
      <button onclick="closeRecipeModal()" class="text-gray-300 hover:text-gray-600 text-2xl p-1"><i class="fas fa-times"></i></button>
    </div>
    <p class="text-sm text-gray-600 italic mb-4">${r.desc}</p>

    <div class="flex gap-2 mb-4">
      <button onclick="setPortions(4)" class="flex-1 py-2 rounded-xl text-sm font-bold transition-all ${recipePortions===4?'bg-green-500 text-white shadow':'bg-gray-100 text-gray-600'}">
        <i class="fas fa-users mr-1"></i>Dla 4 osób
      </button>
      <button onclick="setPortions(2)" class="flex-1 py-2 rounded-xl text-sm font-bold transition-all ${recipePortions===2?'bg-green-500 text-white shadow':'bg-gray-100 text-gray-600'}">
        <i class="fas fa-user-friends mr-1"></i>Oryginał (2)
      </button>
    </div>

    <div class="bg-green-50 rounded-xl p-3 mb-4">
      <h3 class="font-bold text-gray-700 text-sm mb-2">🛒 Składniki (${recipePortions} osób):</h3>
      <ul class="space-y-1">
        ${r.ingredients.map(ing=>{
          const have = haveItems.some(h=>h.includes(ing.key)||h.includes(ing.name.toLowerCase()));
          const amt = ing.amount * ratio;
          const amtStr = Number.isInteger(amt) ? amt : amt.toFixed(1);
          return `<li class="flex items-center gap-2 text-sm ${have?'text-green-700':'text-red-500'}">
            <i class="fas ${have?'fa-check-circle text-green-500':'fa-times-circle text-red-400'} text-xs shrink-0"></i>
            <span>${ing.unit?`${amtStr} ${ing.unit}`:`${amtStr}×`} ${ing.name}</span>
            ${have?'<span class="text-xs text-green-400 ml-auto">✓ mamy</span>':'<span class="text-xs text-red-300 ml-auto">brak</span>'}
          </li>`;
        }).join('')}
      </ul>
    </div>

    <div class="mb-4">
      <h3 class="font-bold text-gray-700 text-sm mb-2">👩‍🍳 Kroki:</h3>
      <ol class="space-y-2">
        ${r.steps.map((step,i)=>`
          <li class="flex gap-3 text-sm text-gray-700">
            <span class="w-6 h-6 rounded-full bg-green-500 text-white font-bold flex items-center justify-center text-xs shrink-0">${i+1}</span>
            <span>${step}</span>
          </li>
        `).join('')}
      </ol>
    </div>

    <a href="${r.source}" target="_blank" class="flex items-center gap-2 text-xs text-green-600 hover:text-green-800 transition-colors">
      <i class="fas fa-external-link-alt"></i> Pełny przepis na AniaGotuje.pl
    </a>
  `;
}

function setPortions(n) { recipePortions = n; renderRecipeModal(); }

function randomRecipe() {
  const r = RECIPES[Math.floor(Math.random()*RECIPES.length)];
  openRecipe(r.id);
}

function switchTab(tab) {
  currentTab = tab;
  ['shopping','expenses','recipes'].forEach(t => {
    const btn = document.getElementById('tab-'+t);
    const panel = document.getElementById('panel-'+t);
    if (t===tab) { btn.classList.add('tab-active'); panel.classList.remove('hidden'); }
    else { btn.classList.remove('tab-active'); panel.classList.add('hidden'); }
  });
  if (tab==='expenses') renderExpenses();
  if (tab==='recipes') renderRecipes(document.getElementById('filter-owned')?.checked);
  if (tab==='shopping') renderShopping();
}

function setShoppingFilter(f) {
  shoppingFilter = f;
  ['all','want','cart','have'].forEach(x => {
    document.getElementById('sf-'+x)?.classList[x===f?'add':'remove']('filter-active');
    document.getElementById('sf-'+x)?.classList[x!==f?'add':'remove']('bg-white','text-gray-600');
  });
  renderShopping();
}

function setDietFilter(f) {
  dietFilter = f;
  document.querySelectorAll('[data-diet]').forEach(el => {
    const d = el.dataset.diet;
    if (d===f) el.classList.add('filter-active','!bg-green-500','!text-white');
    else el.classList.remove('filter-active','!bg-green-500','!text-white');
  });
  renderShopping();
}

          <form id="add-item-form" onsubmit="handleAddItem(event)">
            <input id="item-name" type="text" placeholder="Np. chleb, pomidory, piwo…" required
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm mb-3 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-100" />
            <p class="text-xs font-bold text-gray-500 mb-2">Tagi dietetyczne:</p>
            <div class="grid grid-cols-2 gap-2 mb-3">
              ${DIET_TAGS.map(t=>`
                <label class="flex items-center gap-2 text-xs cursor-pointer">
                  <input type="checkbox" id="tag-${t.replace(/\s/g,'')}" class="accent-green-500 w-4 h-4">
                  ${tagBadge(t)}
                </label>
              `).join('')}
            </div>
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-xl text-sm transition-colors">
              <i class="fas fa-plus mr-1"></i>Dodaj do listy
            </button>
          </form>
        </div>

        <div class="mb-3">
          <p class="text-xs text-gray-400 font-bold mb-2">FILTRUJ STATUS:</p>
          <div class="flex gap-2 flex-wrap">
            <button id="sf-all" onclick="setShoppingFilter('all')" class="text-xs px-3 py-1.5 rounded-full font-bold bg-white text-gray-600 border border-gray-200 transition-all">Wszystkie</button>
            <button id="sf-want" onclick="setShoppingFilter('want')" class="text-xs px-3 py-1.5 rounded-full font-bold bg-white text-gray-600 border border-gray-200 transition-all">🛒 Do kupienia</button>
            <button id="sf-cart" onclick="setShoppingFilter('cart')" class="text-xs px-3 py-1.5 rounded-full font-bold bg-white text-gray-600 border border-gray-200 transition-all">🧺 W koszyku</button>
            <button id="sf-have" onclick="setShoppingFilter('have')" class="text-xs px-3 py-1.5 rounded-full font-bold bg-white text-gray-600 border border-gray-200 transition-all">✅ Mamy to</button>
          </div>
        </div>

        <div class="mb-4">
          <p class="text-xs text-gray-400 font-bold mb-2">FILTRUJ DIETĘ:</p>
          <div class="flex gap-2 flex-wrap">
            <button data-diet="all" onclick="setDietFilter('all')" class="text-xs px-3 py-1.5 rounded-full font-bold bg-green-500 text-white transition-all">Wszystkie</button>
            ${DIET_TAGS.map(t=>`<button data-diet="${t}" onclick="setDietFilter('${t}')" class="text-xs px-3 py-1.5 rounded-full font-bold bg-white text-gray-600 border border-gray-200 transition-all">${t}</button>`).join('')}
          </div>
        </div>

        <div id="shopping-list"></div>
      </div>

      <!-- PANEL: EXPENSES -->
      <div id="panel-expenses" class="hidden">
        <div id="expenses-summary"></div>
        <div class="bg-white rounded-2xl p-4 shadow-sm mb-4 border border-amber-50">
          <h3 class="font-bold text-gray-700 text-sm mb-3"><i class="fas fa-plus-circle text-amber-500 mr-1"></i>Dodaj wydatek</h3>
          <form id="add-expense-form" onsubmit="handleAddExpense(event)">
            <input id="exp-title" type="text" placeholder="Np. Zakupy Biedronka, Paliwo…" required
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm mb-2 focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-100" />
            <div class="flex gap-2 mb-2">
              <div class="flex-1 relative">
                <input id="exp-amount" type="number" step="0.01" min="0.01" placeholder="Kwota" required
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-100" />
                <span class="absolute right-3 top-2.5 text-gray-400 text-sm font-bold">PLN</span>
              </div>
              <select id="exp-payer" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400 bg-white">
                ${USERS.map(u=>`<option value="${u}" ${u===currentUser?'selected':''}>${USER_AVATARS[u]} ${u}</option>`).join('')}
              </select>
            </div>
            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-xl text-sm transition-colors">
              <i class="fas fa-plus mr-1"></i>Dodaj wydatek
            </button>
          </form>
        </div>
        <h3 class="text-xs font-bold text-gray-400 mb-2">HISTORIA WYDATKÓW:</h3>
        <div id="expenses-list"></div>
      </div>

      <!-- PANEL: RECIPES -->
      <div id="panel-recipes" class="hidden">
        <div class="flex gap-2 mb-4">
          <button onclick="randomRecipe()" class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold py-3 rounded-2xl text-sm shadow-md hover:shadow-lg transition-all">
            <i class="fas fa-dice mr-2"></i>Co dziś zjemy?
          </button>
        </div>
        <label class="flex items-center gap-2 text-sm text-gray-600 mb-4 cursor-pointer bg-white rounded-xl p-3 shadow-sm border border-green-50">
          <input type="checkbox" id="filter-owned" onchange="renderRecipes(this.checked)" class="accent-green-500 w-4 h-4">
          <span class="font-semibold">Tylko z tego co mamy ✅</span>
          <span class="text-xs text-gray-400 ml-auto">(filtruj po "Mamy to")</span>
        </label>
        <div id="recipes-grid" class="grid grid-cols-2 gap-3"></div>
      </div>

    </main>

    <!-- RECIPE MODAL -->
    <div id="recipe-modal" class="hidden fixed inset-0 z-50 items-end justify-center modal-bg" onclick="if(event.target===this)closeRecipeModal()">
      <div class="bg-white rounded-t-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-5 shadow-2xl">
        <div id="recipe-modal-content"></div>
      </div>
    </div>
  `;
}

// ============================================================
//  AUTH
// ============================================================

function login(user) {
  currentUser = user;
  localStorage.setItem('dzialkUser', user);
  renderApp();
  showToast(`Cześć ${user}! 👋`);
}

function logout() {
  localStorage.removeItem('dzialkUser');
  currentUser = null;
  document.getElementById('root').innerHTML = buildLoginScreen();
}

async function renderApp() {
  document.getElementById('root').innerHTML = buildApp();
  await Promise.all([loadShopping(), loadExpenses()]);
  switchTab('shopping');
  setShoppingFilter('all');
  setupRealtime();
}

// ============================================================
//  BOOT
// ============================================================

async function boot() {
  initSupabase();
  const saved = localStorage.getItem('dzialkUser');
  if (saved && USERS.includes(saved)) {
    currentUser = saved;
    await renderApp();
  } else {
    document.getElementById('root').innerHTML = buildLoginScreen();
  }
}

window.addEventListener('DOMContentLoaded', boot);
</script>

<div id="root" class="min-h-screen"></div>

</body>
</html>
